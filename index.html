<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIE 2025 — My Schedule</title>
<style>
  :root {
    --bg: #f4f6fb;
    --surface: #ffffff;
    --surface2: #eef0f8;
    --border: #d8dcea;
    --text: #1a1d2e;
    --muted: #636a8a;
    --primary: #3b5bdb;
    --primary-bg: #eef2ff;
    --primary-border: #bac8ff;
    --backup: #d97706;
    --backup-bg: #fffbeb;
    --backup-border: #fcd34d;
    --other: #cbd0e8;
    --pill-r: 999px;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  header {
    padding: 24px 32px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  header .subtitle { color: var(--muted); font-size: 13px; }

  .legend {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-left: auto;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .dot-primary { background: var(--primary); }
  .dot-backup { background: var(--backup); }
  .dot-other { background: var(--other); }

  .controls {
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  .tabs {
    display: flex;
    gap: 4px;
  }
  .tab {
    padding: 6px 14px;
    border-radius: var(--pill-r);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .tab:hover { border-color: var(--primary); color: var(--text); }
  .tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }

  .filter-group {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }
  .filter-btn {
    padding: 5px 12px;
    border-radius: var(--pill-r);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .filter-btn:hover { color: var(--text); }
  .filter-btn.active-primary { border-color: var(--primary); color: var(--primary); background: var(--primary-bg); }
  .filter-btn.active-backup { border-color: var(--backup); color: var(--backup); background: var(--backup-bg); }
  .filter-btn.active-all { border-color: var(--border); color: var(--text); background: var(--surface); }

  .stats {
    font-size: 12px;
    color: var(--muted);
    margin-left: 8px;
  }

  main {
    padding: 24px 32px;
    max-width: 1400px;
  }

  .day-view { display: none; }
  .day-view.active { display: block; }

  .timeslot {
    margin-bottom: 28px;
  }
  .time-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .session-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
  }

  .card {
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }
  .card:hover { transform: translateY(-1px); }
  .card.primary {
    border-color: var(--primary-border);
    background: var(--primary-bg);
  }
  .card.primary:hover { border-color: var(--primary); }
  .card.backup {
    border-color: var(--backup-border);
    background: var(--backup-bg);
  }
  .card.backup:hover { border-color: var(--backup); }
  .card.other { opacity: 0.6; }
  .card.hidden { display: none; }

  .card-top {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
    flex-wrap: wrap;
    min-height: 20px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .card.primary .card-title { color: #2d44b0; }
  .card.backup .card-title { color: #92400e; }

  .badge {
    padding: 2px 8px;
    border-radius: var(--pill-r);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-primary { background: var(--primary); color: #fff; }
  .badge-backup { background: var(--backup); color: #1a0f00; }

  .card-meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .card-meta span { display: flex; align-items: center; gap: 3px; }

  .card-speakers {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conflict-flag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: var(--pill-r);
    background: #fee2e2;
    border: 1px solid #fca5a5;
    color: #b91c1c;
    margin-bottom: 6px;
  }

  /* Modal */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    max-width: 680px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px 24px 28px;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text); background: var(--border); }

  .modal-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: var(--pill-r);
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .modal-badge-primary { background: var(--primary); color: #fff; }
  .modal-badge-backup { background: var(--backup); color: #fff; }
  .modal-badge-other { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  .modal h2 {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: 14px;
    padding-right: 28px;
  }
  .modal-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .modal-meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .modal-meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
  .modal-meta-value { font-size: 13px; font-weight: 500; }

  .modal-speakers {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .modal-desc {
    font-size: 13px;
    line-height: 1.7;
    color: #374060;
    white-space: pre-wrap;
  }

  .modal-reason {
    margin-top: 16px;
    padding: 12px 14px;
    background: var(--primary-bg);
    border-radius: 8px;
    border-left: 3px solid var(--primary);
    font-size: 12px;
    color: var(--muted);
  }
  .modal-reason strong { color: var(--text); }

  .empty { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; }

  .reset-btn {
    padding: 4px 12px;
    border-radius: var(--pill-r);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    margin-left: 8px;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #ef4444; color: #ef4444; }

  .edited-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #a855f7;
    display: inline-block;
    margin-left: 4px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  .modal-override {
    display: flex;
    gap: 8px;
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  .modal-override-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 4px;
  }
  .override-btn {
    padding: 5px 14px;
    border-radius: var(--pill-r);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .override-btn:hover { color: var(--text); border-color: var(--text); }
  .override-btn.active-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
  .override-btn.active-backup  { background: var(--backup);  border-color: var(--backup);  color: #fff; }
  .override-btn.active-other   { background: var(--surface2); border-color: var(--border); color: var(--text); }

  /* ── Mobile ── */
  @media (max-width: 640px) {
    header {
      padding: 14px 16px 12px;
      gap: 6px;
    }
    header h1 { font-size: 17px; }
    .legend { display: none; }

    .controls {
      padding: 8px 12px;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tabs { gap: 3px; flex-wrap: wrap; }
    .tab { padding: 5px 10px; font-size: 12px; }

    .filter-group { margin-left: 0; flex-wrap: wrap; }
    .filter-btn { padding: 4px 9px; font-size: 11px; }

    .stats { width: 100%; margin-left: 0; }

    main { padding: 12px 10px; }

    .session-grid { grid-template-columns: 1fr; }

    .conflict-flag { font-size: 9px; padding: 2px 5px; }

    .modal {
      padding: 18px 16px 24px;
      border-radius: 12px;
      max-height: 92vh;
    }
    .modal h2 { font-size: 15px; }
    .modal-meta { gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>AIE 2025 — My Schedule</h1>
    <div class="subtitle">29 Jun – 2 Jul · 553 sessions scored by interest</div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="dot dot-primary"></div> Primary — must attend</div>
    <div class="legend-item"><div class="dot dot-backup"></div> Backup — strong interest</div>
    <div class="legend-item"><div class="dot dot-other"></div> Other</div>
    <button id="reset-btn" class="reset-btn" onclick="resetOverrides()" style="display:none">Reset edits</button>
  </div>
</header>

<div class="controls">
  <div class="tabs" id="tabs"></div>
  <div class="filter-group">
    <button class="filter-btn active-all" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" data-filter="primary" onclick="setFilter('primary')">Primary only</button>
    <button class="filter-btn" data-filter="backup" onclick="setFilter('backup')">Primary + Backup</button>
  </div>
  <span class="stats" id="stats"></span>
</div>

<main id="main"></main>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">×</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const SESSIONS_URL = 'sessions.json';
const STORAGE_KEY = 'aie-overrides';

let allDays = {};
let currentDay = null;
let currentFilter = 'all';
// overrides: { "Day|Title": "primary"|"backup"|"other" }
let overrides = {};

function loadOverrides() {
  try { overrides = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { overrides = {}; }
}
function saveOverrides() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides));
  document.getElementById('reset-btn').style.display = Object.keys(overrides).length ? '' : 'none';
}
function overrideKey(day, title) { return `${day}|${title}`; }

function effectiveInterest(s, day) {
  const k = overrideKey(day, s.title);
  return overrides[k] !== undefined ? overrides[k] : s.interest;
}

function resetOverrides() {
  if (!confirm('Reset all manual edits and restore auto-scored picks?')) return;
  overrides = {};
  saveOverrides();
  render();
}

async function load() {
  const res = await fetch(SESSIONS_URL);
  allDays = await res.json();
  loadOverrides();
  render();
}

function render() {
  const days = Object.keys(allDays);

  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = days.map((d, i) =>
    `<button class="tab${i === 0 ? ' active' : ''}" onclick="switchDay('${d}')">${d}</button>`
  ).join('');

  currentDay = days[0];

  const main = document.getElementById('main');
  main.innerHTML = days.map(day =>
    `<div class="day-view${day === currentDay ? ' active' : ''}" id="day-${CSS.escape(day)}">
      ${renderDay(allDays[day], day)}
    </div>`
  ).join('');

  document.getElementById('reset-btn').style.display = Object.keys(overrides).length ? '' : 'none';
  updateStats();
}

function renderDay(sessions, day) {
  const byTime = {};
  for (const s of sessions) {
    if (!byTime[s.time]) byTime[s.time] = [];
    byTime[s.time].push(s);
  }

  // Detect conflicts using effective interest
  const conflictTimes = new Set(
    Object.entries(byTime)
      .filter(([, ss]) => ss.filter(s => effectiveInterest(s, day) === 'primary').length > 1)
      .map(([t]) => t)
  );

  return Object.entries(byTime)
    .sort(([a], [b]) => sortTime(a) - sortTime(b))
    .map(([time, slots]) => {
      const isConflict = conflictTimes.has(time);
      const cards = slots
        .sort((a, b) => b.score - a.score)
        .map(s => renderCard(s, day, isConflict && effectiveInterest(s, day) === 'primary'))
        .join('');
      return `
        <div class="timeslot" data-time="${time}">
          <div class="time-label">${time}${isConflict ? ' ⚠ conflict — multiple primary sessions' : ''}</div>
          <div class="session-grid">${cards}</div>
        </div>`;
    }).join('');
}

function renderCard(s, day, conflict) {
  const interest = effectiveInterest(s, day);
  const isEdited = overrides[overrideKey(day, s.title)] !== undefined;
  const conflictBadge = conflict ? `<span class="conflict-flag">conflict</span>` : '';
  const editedDot = isEdited ? `<span class="edited-dot" title="Manually edited"></span>` : '';
  const badge = interest === 'primary'
    ? `<span class="badge badge-primary">★ PRIMARY</span>`
    : interest === 'backup'
      ? `<span class="badge badge-backup">◎ BACKUP</span>`
      : '';

  return `
    <div class="card ${interest}" data-interest="${interest}" onclick="openModal('${escapeAttr(s.title)}', '${escapeAttr(day)}')">
      <div class="card-top">${conflictBadge}${badge}${editedDot}</div>
      <div class="card-title">${escapeHtml(s.title)}</div>
      <div class="card-meta">
        <span>🕐 ${escapeHtml(s.time)}</span>
        <span>📍 ${escapeHtml(s.room)}</span>
        ${s.type ? `<span>🏷 ${escapeHtml(s.type)}</span>` : ''}
      </div>
      ${s.speakers ? `<div class="card-speakers">${escapeHtml(truncate(s.speakers, 70))}</div>` : ''}
    </div>`;
}

function openModal(title, day) {
  const sessions = allDays[day];
  const s = sessions.find(x => x.title === title);
  if (!s) return;

  const interest = effectiveInterest(s, day);
  const badgeClass = interest === 'primary' ? 'modal-badge-primary'
    : interest === 'backup' ? 'modal-badge-backup' : 'modal-badge-other';
  const badgeLabel = interest === 'primary' ? 'PRIMARY PICK'
    : interest === 'backup' ? 'BACKUP PICK' : 'OTHER';
  const isEdited = overrides[overrideKey(day, title)] !== undefined;

  document.getElementById('modal-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <div class="modal-badge ${badgeClass}">${badgeLabel}</div>
      ${isEdited ? '<span style="font-size:11px;color:#a855f7">✎ manually set</span>' : ''}
    </div>
    <h2>${escapeHtml(s.title)}</h2>
    <div class="modal-meta">
      <div class="modal-meta-item">
        <div class="modal-meta-label">Time</div>
        <div class="modal-meta-value">${escapeHtml(s.time)}</div>
      </div>
      <div class="modal-meta-item">
        <div class="modal-meta-label">Room</div>
        <div class="modal-meta-value">${escapeHtml(s.room)}</div>
      </div>
      ${s.type ? `<div class="modal-meta-item">
        <div class="modal-meta-label">Type</div>
        <div class="modal-meta-value">${escapeHtml(s.type)}</div>
      </div>` : ''}
      ${s.track ? `<div class="modal-meta-item">
        <div class="modal-meta-label">Track</div>
        <div class="modal-meta-value">${escapeHtml(s.track)}</div>
      </div>` : ''}
    </div>
    ${s.speakers ? `<div class="modal-speakers">🎙 ${escapeHtml(s.speakers)}</div>` : ''}
    ${s.description ? `<div class="modal-desc">${escapeHtml(s.description)}</div>` : ''}
    <div class="modal-override">
      <span class="modal-override-label">Mark as:</span>
      <button class="override-btn ${interest === 'primary' ? 'active-primary' : ''}" onclick="setOverride('${escapeAttr(title)}','${escapeAttr(day)}','primary')">★ Primary</button>
      <button class="override-btn ${interest === 'backup'  ? 'active-backup'  : ''}" onclick="setOverride('${escapeAttr(title)}','${escapeAttr(day)}','backup')">◎ Backup</button>
      <button class="override-btn ${interest === 'other'   ? 'active-other'   : ''}" onclick="setOverride('${escapeAttr(title)}','${escapeAttr(day)}','other')">✕ Other</button>
      ${isEdited ? `<button class="override-btn" onclick="clearOverride('${escapeAttr(title)}','${escapeAttr(day)}')" style="margin-left:auto;color:#a855f7;border-color:#a855f7">↩ Reset to auto</button>` : ''}
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
}

function setOverride(title, day, interest) {
  overrides[overrideKey(day, title)] = interest;
  saveOverrides();
  // Re-render the day and reopen modal with updated state
  const dayEl = document.getElementById(`day-${CSS.escape(day)}`);
  if (dayEl) dayEl.innerHTML = renderDay(allDays[day], day);
  applyFilter();
  updateStats();
  openModal(title, day);
}

function clearOverride(title, day) {
  delete overrides[overrideKey(day, title)];
  saveOverrides();
  const dayEl = document.getElementById(`day-${CSS.escape(day)}`);
  if (dayEl) dayEl.innerHTML = renderDay(allDays[day], day);
  applyFilter();
  updateStats();
  openModal(title, day);
}

function closeModal(e) {
  if (e.target === document.getElementById('overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('overlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

function switchDay(day) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent === day));
  document.querySelectorAll('.day-view').forEach(d => d.classList.remove('active'));
  const el = document.getElementById(`day-${CSS.escape(day)}`);
  if (el) el.classList.add('active');
  currentDay = day;
  applyFilter();
  updateStats();
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.className = 'filter-btn';
    if (b.dataset.filter === filter) {
      if (filter === 'primary') b.classList.add('active-primary');
      else if (filter === 'backup') b.classList.add('active-backup');
      else b.classList.add('active-all');
    }
  });
  applyFilter();
  updateStats();
}

function applyFilter() {
  document.querySelectorAll('.card').forEach(card => {
    const interest = card.dataset.interest;
    let show = true;
    if (currentFilter === 'primary') show = interest === 'primary';
    else if (currentFilter === 'backup') show = interest === 'primary' || interest === 'backup';
    card.classList.toggle('hidden', !show);
  });

  document.querySelectorAll('.day-view.active .timeslot').forEach(ts => {
    const visible = [...ts.querySelectorAll('.card')].some(c => !c.classList.contains('hidden'));
    ts.style.display = visible ? '' : 'none';
  });
}

function updateStats() {
  const sessions = allDays[currentDay] || [];
  const p = sessions.filter(s => effectiveInterest(s, currentDay) === 'primary').length;
  const b = sessions.filter(s => effectiveInterest(s, currentDay) === 'backup').length;
  const edits = Object.keys(overrides).filter(k => k.startsWith(currentDay + '|')).length;
  document.getElementById('stats').textContent =
    `${p} primary · ${b} backup this day${edits ? ` · ${edits} edited` : ''}`;
}

function sortTime(t) {
  if (!t) return 9999;
  const m = t.match(/(\d+):(\d+)(am|pm)/i);
  if (!m) return 9999;
  let h = parseInt(m[1]);
  const min = parseInt(m[2]);
  if (m[3].toLowerCase() === 'pm' && h !== 12) h += 12;
  if (m[3].toLowerCase() === 'am' && h === 12) h = 0;
  return h * 60 + min;
}

function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
